        // --- Custom Hooks ---

        const useInView = (options = {}) => {
          const { threshold = 0.1, once = true } = options;
          const ref = useRef(null);
          const [isInView, setIsInView] = useState(false);

          useEffect(() => {
            const element = ref.current;
            if (!element) return;

            const observer = new IntersectionObserver(
              ([entry]) => {
                if (entry.isIntersecting) {
                  setIsInView(true);
                  if (once) observer.unobserve(element);
                } else if (!once) {
                  setIsInView(false);
                }
              },
              { threshold }
            );

            observer.observe(element);
            return () => observer.disconnect();
          }, [threshold, once]);

          return [ref, isInView];
        };

        const useActiveSection = (sectionIds) => {
          const [activeId, setActiveId] = useState('');

          useEffect(() => {
            const observers = [];
            sectionIds.forEach((id) => {
              const el = document.getElementById(id);
              if (!el) return;
              const observer = new IntersectionObserver(
                ([entry]) => {
                  if (entry.isIntersecting) setActiveId(id);
                },
                { threshold: 0.3, rootMargin: '-80px 0px -50% 0px' }
              );
              observer.observe(el);
              observers.push(observer);
            });
            return () => observers.forEach((o) => o.disconnect());
          }, []);

          return activeId;
        };

        const useTypingEffect = (phrases, typingSpeed = 80, deletingSpeed = 40, pauseDuration = 2000) => {
          const [text, setText] = useState('');
          const [phraseIndex, setPhraseIndex] = useState(0);
          const [isDeleting, setIsDeleting] = useState(false);

          useEffect(() => {
            const currentPhrase = phrases[phraseIndex];
            let timeout;

            if (!isDeleting && text === currentPhrase) {
              timeout = setTimeout(() => setIsDeleting(true), pauseDuration);
            } else if (isDeleting && text === '') {
              setIsDeleting(false);
              setPhraseIndex((prev) => (prev + 1) % phrases.length);
            } else {
              timeout = setTimeout(() => {
                setText(currentPhrase.substring(0, text.length + (isDeleting ? -1 : 1)));
              }, isDeleting ? deletingSpeed : typingSpeed);
            }

            return () => clearTimeout(timeout);
          }, [text, isDeleting, phraseIndex, phrases]);

          return text;
        };

        // --- Animation Wrapper Components ---

        const AnimateIn = ({ children, delay = 0, className = '' }) => {
          const [ref, isInView] = useInView({ threshold: 0.1 });

          return (
            <div
              ref={ref}
              className={className}
              style={{
                opacity: isInView ? 1 : 0,
                transform: isInView ? 'translateY(0)' : 'translateY(30px)',
                transition: `opacity 0.6s ease-out ${delay}ms, transform 0.6s ease-out ${delay}ms`,
              }}
            >
              {children}
            </div>
          );
        };

        // --- Image Carousel ---
        const ImageCarousel = ({ images, interval = 4000 }) => {
          const [current, setCurrent] = React.useState(0);
          const timerRef = React.useRef(null);

          const resetTimer = () => {
            if (timerRef.current) clearInterval(timerRef.current);
            timerRef.current = setInterval(() => {
              setCurrent(prev => (prev + 1) % images.length);
            }, interval);
          };

          React.useEffect(() => {
            resetTimer();
            return () => clearInterval(timerRef.current);
          }, [images.length, interval]);

          const go = (idx) => {
            setCurrent(idx);
            resetTimer();
          };

          const prev = () => go((current - 1 + images.length) % images.length);
          const next = () => go((current + 1) % images.length);

          return (
            <div className="relative">
              {/* Images */}
              <div className="relative w-full overflow-hidden" style={{ paddingBottom: '56.25%' }}>
                {images.map((src, i) => (
                  <img

                    src={src}
                    alt={`App preview ${i + 1}`}
                    loading={i === 0 ? "eager" : "lazy"}
                    className="absolute inset-0 w-full h-full object-cover"
                    style={{
                      opacity: i === current ? 1 : 0,
                      transition: 'opacity 0.5s ease-in-out',
                    }}
                  />
                ))}
              </div>

              {/* Prev / Next arrows */}

                onClick={prev}
                className="absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/40 hover:bg-black/60 flex items-center justify-center text-white opacity-70 md:opacity-0 md:group-hover:opacity-100 transition-opacity"
                aria-label="Previous image"
              >
                <ChevronLeft size={20} />
              </button>
              <button
                onClick={next}
                className="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/40 hover:bg-black/60 flex items-center justify-center text-white opacity-70 md:opacity-0 md:group-hover:opacity-100 transition-opacity"
                aria-label="Next image"
              >
                <ChevronRight size={20} />
              </button>

                {images.map((_, i) => (
                  <button
                    key={i}
                    onClick={() => go(i)}

                    }`}
                    aria-label={`Go to image ${i + 1}`}
                  />
                ))}
              </div>
            </div>
          );

        const highlightPython = (code) => {
          const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const tokens = [];
          const src = code;
          let i = 0;
          while (i < src.length) {
            // Comments
            if (src[i] === '#') {
              let end = src.indexOf('\n', i);
              if (end === -1) end = src.length;
              tokens.push('<span style="color:#64748b;font-style:italic">' + esc(src.slice(i, end)) + '</span>');
              i = end;
              continue;
            }
            // Strings (f-strings, triple-quoted, single/double)
            if ((src[i] === 'f' && (src[i+1] === '"' || src[i+1] === "'")) ||
                src[i] === '"' || src[i] === "'") {
              let start = i;
              let prefix = '';
              if (src[i] === 'f') { prefix = 'f'; i++; }
              const q = src.slice(i, i+3) === '"""' || src.slice(i, i+3) === "'''" ? src.slice(i, i+3) : src[i];
              i += q.length;
              while (i < src.length) {
                if (src[i] === '\\') { i += 2; continue; }
                if (src.slice(i, i + q.length) === q) { i += q.length; break; }
                i++;
              }
              tokens.push('<span style="color:#34d399">' + esc(src.slice(start, i)) + '</span>');
              continue;
            }
            // Numbers
            if (/[0-9]/.test(src[i]) && (i === 0 || /[\s(,=\[{+\-*/:]/.test(src[i-1]))) {
              let start = i;
              while (i < src.length && /[0-9._eE]/.test(src[i])) i++;
              tokens.push('<span style="color:#fbbf24">' + esc(src.slice(start, i)) + '</span>');
              continue;
            }
            // Words (keywords, builtins, identifiers)
            if (/[a-zA-Z_]/.test(src[i])) {
              let start = i;
              while (i < src.length && /[a-zA-Z0-9_]/.test(src[i])) i++;
              const word = src.slice(start, i);
              const keywords = ['import','from','as','def','class','return','if','elif','else','for','while','in','not','and','or','is','with','try','except','finally','raise','pass','break','continue','lambda','yield','True','False','None','del','global','nonlocal','assert'];
              const builtins = ['print','display','len','int','str','float','list','dict','set','tuple','range','type','isinstance','open','super','map','filter','zip','enumerate','sorted','reversed','abs','round','min','max','sum','any','all','input','format','bool','bytes','hex','id','iter','next','object','repr','getattr','setattr','hasattr','callable','staticmethod','classmethod','property'];
              if (keywords.includes(word)) {
                tokens.push('<span style="color:#818cf8;font-weight:600">' + esc(word) + '</span>');
              } else if (builtins.includes(word)) {
                tokens.push('<span style="color:#22d3ee">' + esc(word) + '</span>');
              } else {
                tokens.push('<span style="color:#cbd5e1">' + esc(word) + '</span>');
              }
              continue;
            }
            // Operators and punctuation
            if (/[=+\-*/<>!%&|^~@]/.test(src[i])) {
              tokens.push('<span style="color:#94a3b8">' + esc(src[i]) + '</span>');
              i++;
              continue;
            }
            // Everything else (whitespace, parens, brackets, etc.)
            tokens.push(esc(src[i]));
            i++;
          }
          return tokens.join('');
        };

            if (searchQuery === "") return true;
            const q = searchQuery.toLowerCase();

              || (item.description_es && item.description_es.toLowerCase().includes(q))
              || item.tags.some(tag => tag.toLowerCase().includes(q));
          });

          // Sort: pinned first, then by date descending

            if (a.pinned !== b.pinned) return b.pinned - a.pinned;
            return new Date(b.date) - new Date(a.date);
          });

import plotly.express as px

# 1. SETUP: Define Source URLs
REPO_URL = "https://raw.githubusercontent.com/quarcs-lab/bolivia112/main"

url_names = f"{REPO_URL}/regionNames/regionNames.csv"
url_sdg   = f"{REPO_URL}/sdg/sdg.csv"
url_ntl   = f"{REPO_URL}/ntl/ln_NTLpc.csv"
url_emb   = f"{REPO_URL}/satelliteEmbeddings/satelliteEmbeddings2017.csv"

# 2. LOAD: Read CSVs
print("Loading datasets...")
df_names      = pd.read_csv(url_names)
df_sdg        = pd.read_csv(url_sdg)
df_ntl        = pd.read_csv(url_ntl)
df_embeddings = pd.read_csv(url_emb)

# 3. MERGE: Combine Dataframes
df = pd.merge(df_names, df_sdg, on='prov_id', how='inner')
df = pd.merge(df, df_ntl, on='prov_id', how='inner')
df = pd.merge(df, df_embeddings, on='prov_id', how='inner')

# 4. VERIFY
print(f"Merge Complete. Final Rows: {len(df)}")
display(df[['prov', 'dep', 'imds', 'ln_NTLpc2019', 'A00']].head())

# 5. SCATTERPLOT: Development vs NTL
fig = px.scatter(
    df, x='ln_NTLpc2019', y='imds',
    hover_name='mun', color='dep',
    trendline='ols', trendline_scope='overall',
    labels={'ln_NTLpc2019': 'Log Night-time Lights (2019)',
            'imds': 'Sustainable Development Index'},
    title='Sustainable Development vs Night-time Lights'
)

fig.show()`}
                      />

import matplotlib.pyplot as plt

# 1. LOAD SPATIAL DATA
geojson_url = f"{REPO_URL}/maps/bolivia112provincesOpt.geojson"
print("Loading GeoJSON map...")
gdf_boundaries = gpd.read_file(geojson_url)

# 2. SPATIAL DATA PREPARATION
# Force 'prov_id' to integer to match the pandas dataframe
gdf_boundaries['prov_id'] = gdf_boundaries['prov_id'].astype(int)

# 3. ATTRIBUTE JOIN
gdf_bolivia = gdf_boundaries.merge(df, on='prov_id', how='inner')

# 4. VISUALIZATION (Choropleth Map)
fig, ax = plt.subplots(1, 1, figsize=(12, 10))

gdf_bolivia.plot(
    column='index_sdg1',    # Variable to map
    cmap='viridis',         # Color palette
    linewidth=0.1, edgecolor='white',
    legend=True,
    legend_kwds={'label': "SDG 1 Index (No Poverty)", 'orientation': "horizontal"},
    ax=ax
)

ax.set_title("Bolivia: SDG 1 Index by Province (112 provinces)", fontsize=15)
ax.set_axis_off()
plt.show()`}
